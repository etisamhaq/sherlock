{{- if .Values.secrets.create }}
# Convenience Secret. For production prefer an externally-managed Secret and set
# secrets.create=false with secrets.existingSecret pointing at it.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.existingSecret }}
  labels:
    {{- include "sherlock.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  SHERLOCK_SLACK_WEBHOOK_URL: {{ .Values.secrets.slackWebhookUrl | quote }}
  SHERLOCK_GIT_TOKEN: {{ .Values.secrets.gitToken | quote }}
{{- end }}
