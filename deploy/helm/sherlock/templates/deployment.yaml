apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sherlock.fullname" . }}
  labels:
    {{- include "sherlock.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sherlock.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sherlock.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "sherlock.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: sherlock
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SHERLOCK_LLM_PROVIDER
              value: {{ .Values.llm.provider | quote }}
            - name: SHERLOCK_LLM_MODEL
              value: {{ .Values.llm.model | quote }}
            - name: SHERLOCK_PROMETHEUS_URL
              value: {{ .Values.config.prometheusUrl | quote }}
            - name: SHERLOCK_GIT_PROVIDER
              value: {{ .Values.config.gitProvider | quote }}
            - name: SHERLOCK_GIT_REPO
              value: {{ .Values.config.gitRepo | quote }}
            - name: SHERLOCK_TOKEN_BUDGET
              value: {{ .Values.config.tokenBudget | quote }}
            - name: SHERLOCK_TIME_BUDGET_SECONDS
              value: {{ .Values.config.timeBudgetSeconds | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
                optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
