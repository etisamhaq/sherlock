{{- if .Values.rbac.create }}
# Read-only cluster access — sufficient for investigation. Sherlock never gets
# write/delete verbs. Auto-remediation (future) would require a separate Role.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "sherlock.fullname" . }}-readonly
  labels:
    {{- include "sherlock.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "nodes", "services", "endpoints", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "sherlock.fullname" . }}-readonly
  labels:
    {{- include "sherlock.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "sherlock.fullname" . }}-readonly
subjects:
  - kind: ServiceAccount
    name: {{ include "sherlock.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sherlock.serviceAccountName" . }}
  labels:
    {{- include "sherlock.labels" . | nindent 4 }}
{{- end }}
